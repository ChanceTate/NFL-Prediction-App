name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run ruff lint
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run pytest
        run: uv run pytest

  metrics:
    name: run model / capture metrics
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      # Cache the nflreadpy data so reruns are fast. Key busts whenever
      # src/data.py changes (e.g. season list updates). Path is the whole
      # data/ directory so the cache survives filename changes (the parquet
      # name now includes the season range).
      - name: Cache player stats parquet
        uses: actions/cache@v4
        with:
          path: data
          key: player-stats-${{ hashFiles('src/data.py') }}

      - name: Run model and capture metrics
        run: uv run main.py | tee metrics.txt

      - name: Add metrics to job summary
        run: |
          {
            echo "## Model metrics"
            echo
            echo '```'
            cat metrics.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            metrics.txt
            metrics.json
            importance.json
            ablation.json

      # Find the most recent successful main-branch CI run so we can pull its
      # metrics artifact and compute changes. Returns null on the first PR
      - name: Find latest main run id
        id: find-main-run
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              status: 'success',
              per_page: 1,
            });
            if (runs.workflow_runs.length === 0) {
              core.warning('No previous successful main run — comment will show absolute values only.');
              return '';
            }
            return runs.workflow_runs[0].id.toString();
          result-encoding: string

      - name: Download baseline metrics from main
        if: github.event_name == 'pull_request' && steps.find-main-run.outputs.result != ''
        uses: actions/download-artifact@v4
        with:
          name: metrics
          path: baseline/
          run-id: ${{ steps.find-main-run.outputs.result }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Post comment with deltas, fail on regression
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- metrics-comment -->';
            const TRACKED_FOR_REGRESSION = ['LinearRegression', 'LightGBM'];
            const SKIP_LABEL = 'skip-metrics-check';

            const current = JSON.parse(fs.readFileSync('metrics.json', 'utf8'));
            const currentAggregate = current.aggregate || [];
            const currentFolds = current.folds || [];

            let baseline = null;
            let baselineAggregate = null;
            try {
              const raw = JSON.parse(fs.readFileSync('baseline/metrics.json', 'utf8'));
              // Only the new walk-forward structure has an "aggregate" key.
              // Older single-fold baselines (pre-walk-forward) are skipped so
              // we don't compare apples to oranges.
              if (raw && raw.aggregate) {
                baseline = raw;
                baselineAggregate = raw.aggregate;
              } else {
                core.info('Baseline metrics.json predates walk-forward CV — skipping comparison.');
              }
            } catch (e) {
              core.info('No baseline metrics.json available — first comparison.');
            }

            const findBaseline = (label) =>
              baselineAggregate ? baselineAggregate.find((b) => b.label === label) : null;

            // Delta is "noise" if its magnitude is below half of main's stddev
            // for the same metric — that's the natural noise band for this
            // walk-forward setup. Outside the band, label as improvement or
            // regression with an emoji.
            const fmtDelta = (delta, baselineStd, lowerIsBetter) => {
              if (delta === null || delta === undefined) return '—';
              const sign = delta > 0 ? '+' : '';
              const noiseBand = 0.5 * (baselineStd || 0);
              const isNoise = Math.abs(delta) <= noiseBand;
              const isRegression = lowerIsBetter ? delta > 0 : delta < 0;
              const emoji = isNoise ? '' : (isRegression ? ' ⚠️' : ' ✅');
              return `${sign}${delta.toFixed(2)}${emoji}`;
            };

            // Aggregate table: mean ± std + worst fold + delta vs main
            const aggregateRows = currentAggregate.map((m) => {
              const b = findBaseline(m.label);
              const maeDelta = b ? m.mae_mean - b.mae_mean : null;
              const r2Delta = b ? m.r2_mean - b.r2_mean : null;
              return `| ${m.label} | ${m.mae_mean.toFixed(2)} ± ${m.mae_std.toFixed(2)} | ${fmtDelta(maeDelta, b ? b.mae_std : 0, true)} | ${m.mae_max.toFixed(2)} | ${m.r2_mean.toFixed(2)} ± ${m.r2_std.toFixed(2)} | ${fmtDelta(r2Delta, b ? b.r2_std : 0, false)} |`;
            });

            // Per-fold table: MAE per (model, test season)
            const seasons = currentFolds.map((f) => f.test_season);
            const modelLabels = TRACKED_FOR_REGRESSION.concat(['Baseline (mean)']);
            const perFoldHeader = `| Model | ${seasons.join(' | ')} |`;
            const perFoldSep = `|---${'|---'.repeat(seasons.length)}|`;
            const perFoldRows = modelLabels.map((label) => {
              const cells = currentFolds.map((f) => {
                const m = f.models.find((x) => x.label === label);
                return m ? m.mae.toFixed(2) : '—';
              });
              return `| ${label} | ${cells.join(' | ')} |`;
            });

            const baselineNote = baselineAggregate
              ? `Compared against main run [#${{ steps.find-main-run.outputs.result }}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ steps.find-main-run.outputs.result }}).`
              : '_No baseline available — this is likely the first run, or main predates walk-forward CV._';

            // Feature analysis: one table per model showing permutation
            // importance and ablation Δ side-by-side. Disagreement between
            // the two columns is the most informative signal: high perm +
            // low ablation = redundant; low perm + high ablation = unique
            // contributor the model is under-using.
            let analysisBlock = '';
            try {
              const importance = JSON.parse(fs.readFileSync('importance.json', 'utf8'));
              let ablation = [];
              try {
                ablation = JSON.parse(fs.readFileSync('ablation.json', 'utf8'));
              } catch (e) {
                core.info('No ablation.json available — rendering permutation only.');
              }
              if (importance.length > 0) {
                const sections = importance.map((impEntry) => {
                  const label = impEntry.label;
                  const impLookup = Object.fromEntries(
                    impEntry.importance.map((i) => [i.feature, i.value])
                  );
                  const ablEntry = ablation.find((a) => a.label === label);
                  const ablRows = ablEntry ? ablEntry.ablation : [];
                  // If we have ablation, order rows by ablation Δ descending;
                  // otherwise fall back to permutation order.
                  const rows = ablEntry
                    ? ablRows.map((row) => {
                        const perm = impLookup[row.feature] ?? 0;
                        return `| ${row.feature} | ${perm.toFixed(2)} | ${row.delta_mean >= 0 ? '+' : ''}${row.delta_mean.toFixed(2)} ± ${row.delta_std.toFixed(2)} |`;
                      })
                    : impEntry.importance.map(
                        (i) => `| ${i.feature} | ${i.value.toFixed(2)} | — |`
                      );
                  return (
                    `### ${label}\n\n` +
                    `| Feature | Permutation | Ablation Δ MAE |\n` +
                    `|---|---|---|\n` +
                    rows.join('\n')
                  );
                });
                analysisBlock =
                  `\n\n## Feature analysis (mean across folds)\n\n` +
                  `Permutation = how much the trained model uses each feature ` +
                  `(MAE worsening when its values are shuffled). Ablation Δ = ` +
                  `how much MAE worsens if the model is retrained without it. ` +
                  `Disagreement is informative: high permutation + low ablation = ` +
                  `redundant (model uses it but doesn't need it); low permutation + ` +
                  `high ablation = unique contributor.\n\n` +
                  sections.join('\n\n');
              }
            } catch (e) {
              core.info('No importance.json available — skipping feature analysis.');
            }

            // Regression check: fail only if mean MAE worsens by more than
            // half of main's fold-to-fold stddev. Within that band, the change
            // is statistically indistinguishable from "we got a different
            // luck-of-the-draw on the test seasons" so we don't fail.
            const regressions = [];
            for (const m of currentAggregate) {
              if (!TRACKED_FOR_REGRESSION.includes(m.label)) continue;
              const b = findBaseline(m.label);
              if (!b) continue;
              const delta = m.mae_mean - b.mae_mean;
              const noiseBand = 0.5 * (b.mae_std || 0);
              if (delta > noiseBand) {
                regressions.push(
                  `${m.label} mean MAE worsened by ${delta.toFixed(2)} ` +
                  `(${b.mae_mean.toFixed(2)} → ${m.mae_mean.toFixed(2)}), ` +
                  `beyond noise band of ±${noiseBand.toFixed(2)} (0.5× main std).`
                );
              }
            }

            const prLabels = (context.payload.pull_request?.labels || []).map((l) => l.name);
            const skip = prLabels.includes(SKIP_LABEL);

            let regressionBlock = '';
            if (regressions.length > 0) {
              regressionBlock =
                `\n\n### ⚠️ Regression detected\n\n` +
                regressions.map((r) => `- ${r}`).join('\n') +
                (skip
                  ? `\n\n_Skipped by \`${SKIP_LABEL}\` label._`
                  : `\n\nAdd the \`${SKIP_LABEL}\` label if this is intentional.`);
            }

            const body =
              `${marker}\n## Model metrics (walk-forward CV)\n\n` +
              `### Aggregate (mean ± std across ${currentFolds.length} folds)\n\n` +
              `| Model | MAE | Δ MAE | Worst fold | R² | Δ R² |\n` +
              `|---|---|---|---|---|---|\n` +
              aggregateRows.join('\n') +
              `\n\nΔ is flagged ✅/⚠️ only when its magnitude exceeds 0.5× main's fold-to-fold std (the noise band).\n\n` +
              `### Per-fold MAE\n\n` +
              `${perFoldHeader}\n${perFoldSep}\n${perFoldRows.join('\n')}\n\n` +
              baselineNote +
              regressionBlock +
              analysisBlock;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            if (regressions.length > 0 && !skip) {
              core.setFailed(
                `MAE regression detected. Add '${SKIP_LABEL}' label to override.\n\n${regressions.join('\n')}`
              );
            }
